<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Tagging AI - 태그 예측</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding-top: 50px;
            background-color: #f8f9fa;
            /* 폰트 크기 전체 상향 */
            font-size: 1.1rem; 
        }
        .container {
            max-width: 800px;
        }
        .card-header {
            background-color: #007bff;
            color: white;
            font-weight: bold;
            font-size: 1.25rem;
        }
        #musicInput {
            font-size: 1.05rem; 
        }
        .result-box {
            background-color: #e9ecef;
            border-radius: 5px;
            padding: 15px;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 1.05rem; 
        }
        h1, h2 {
            margin-top: 2rem !important;
            margin-bottom: 1rem !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">🎶 음악 태깅 AI</h1>
        
        <div class="card shadow">
            <div class="card-header">
                텍스트 입력
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="musicInput" class="form-label">원하는 노래의 유튜브 제목 + 채널명을 입력해주세요</label>
                    <textarea class="form-control" id="musicInput" rows="3" placeholder="예: 'BBIBBI (삐삐),이지금 [IU Official]' 또는 '널 너무 모르고 Don't Know You,Heize official'"></textarea>
                </div>
                <button type="button" class="btn btn-primary w-100" id="submitBtn">태그 예측 요청</button>
            </div>
        </div>

        <h2 class="mt-5 mb-3">결과</h2>
        <div class="card">
            <div class="card-body">
                <pre class="result-box" id="resultArea">여기에 예측 결과가 표시됩니다.</pre>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#submitBtn').click(function() {
                var inputText = $('#musicInput').val();
                
                if (inputText.trim() === "") {
                    $('#resultArea').text("텍스트를 입력해주세요.");
                    return;
                }

                $('#resultArea').text("처리 중... 잠시 기다려 주세요.");
                
                $.ajax({
                    url: 'http://127.0.0.1:5000/upload_json', 
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(inputText), 
                    
                    success: function(response) {
                        var formattedJson = JSON.stringify(response, null, 2);
                        $('#resultArea').text(formattedJson);
                    },
                    error: function(xhr, status, error) {
                        var errorMsg = "오류 발생: " + xhr.status + " " + error + "\n" + (xhr.responseJSON ? JSON.stringify(xhr.responseJSON, null, 2) : xhr.responseText);
                        $('#resultArea').text(errorMsg);
                    }
                });
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
